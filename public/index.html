<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UniFi Protect Detection Explorer</title>
  <style>
    :root{
      --bg:#f2f5fa;
      --bg-soft:#f7f9fd;
      --card:#ffffff;
      --ink:#1f2937;
      --ink-soft:#4b5567;
      --line:#dbe3ef;
      --line-soft:#e9eef7;
      --brand:#0f63ff;
      --brand-2:#0b4fd1;
      --brand-soft:#eaf2ff;
      --success:#2d7a46;
      --danger:#b42318;
      --radius-lg:16px;
      --radius-md:12px;
      --radius-sm:10px;
      --shadow-card:0 6px 18px rgba(16,24,40,.05);
      --shadow-soft:0 2px 8px rgba(16,24,40,.04);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,"Segoe UI",Arial,sans-serif;
      color:var(--ink);
      background:
        radial-gradient(1200px 550px at -5% -20%, #e8f0ff 0, transparent 45%),
        radial-gradient(900px 450px at 110% -30%, #edf5ff 0, transparent 45%),
        var(--bg);
      line-height:1.35;
    }

    .wrap{max-width:1220px;margin:0 auto;padding:0 18px}

    .top{
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg,#fafdff 0%, #f1f6ff 100%);
      padding:18px 0 16px;
      position:sticky;
      top:0;
      z-index:5;
      backdrop-filter:blur(8px);
    }

    .title{font-size:24px;font-weight:800;letter-spacing:.1px;margin:0}
    .subtitle{margin-top:6px;font-size:13px;color:var(--ink-soft)}

    .layout{padding:18px 0 22px}

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
      box-shadow:var(--shadow-card);
      padding:16px;
      margin:0 0 14px;
    }

    .section-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
    .section-title{font-size:13px;font-weight:700;color:#314164;text-transform:uppercase;letter-spacing:.45px}

    .grid{display:grid;gap:12px}
    .g4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .g3{grid-template-columns:repeat(3,minmax(0,1fr))}

    .field{display:flex;flex-direction:column;min-width:0}
    label{display:block;font-size:12px;color:var(--ink-soft);margin:0 0 6px 0;font-weight:600}

    input,select,button{
      width:100%;
      min-height:40px;
      padding:10px 11px;
      border:1px solid var(--line);
      border-radius:var(--radius-sm);
      background:#fff;
      color:var(--ink);
      font-size:14px;
      transition:border-color .15s, box-shadow .15s, background .15s;
    }

    input:hover,select:hover{border-color:#c6d3e5}
    input:focus,select:focus{
      outline:none;
      border-color:#9cbcff;
      box-shadow:0 0 0 3px rgba(15,99,255,.14);
    }

    select[multiple]{min-height:158px;padding:8px}

    button{
      border:none;
      cursor:pointer;
      background:linear-gradient(180deg,var(--brand),#0d57e3);
      color:#fff;
      font-weight:700;
      box-shadow:0 6px 14px rgba(15,99,255,.26);
    }
    button:hover{background:linear-gradient(180deg,#1169ff,#0a4fcd)}
    button:disabled{opacity:.68;cursor:not-allowed}

    .btn-muted{
      background:linear-gradient(180deg,#f4f7fe,#e8eefc);
      color:#21407f;
      border:1px solid #d7e2fb;
      box-shadow:none;
    }
    .btn-muted:hover{background:linear-gradient(180deg,#eef3fd,#e2eafb)}

    .row{display:flex;gap:10px;align-items:end;flex-wrap:wrap}

    .toolbar{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:space-between;
      padding:12px 14px;
      border:1px solid var(--line-soft);
      border-radius:14px;
      background:var(--bg-soft);
    }

    .toolbar-actions{display:flex;gap:10px;flex-wrap:wrap;min-width:300px}
    .toolbar-actions button{min-width:220px;flex:1}

    .status{
      font-size:13px;
      color:var(--ink-soft);
      padding:9px 12px;
      border-radius:999px;
      background:#fff;
      border:1px solid var(--line);
      box-shadow:var(--shadow-soft);
      min-height:38px;
      display:flex;
      align-items:center;
    }

    .status.busy{color:#1f57cf;font-weight:600;background:#edf3ff;border-color:#cadeff}
    .status.error{color:var(--danger);font-weight:600;background:#fff2f2;border-color:#ffd4d2}

    .inline-spin{display:inline-block;width:12px;height:12px;border:2px solid #b9cdfa;border-top-color:#2b62ff;border-radius:50%;animation:rot .9s linear infinite;margin-right:6px;vertical-align:-1px}

    .chips{display:flex;flex-wrap:wrap;gap:7px}
    .pill{
      display:inline-flex;
      align-items:center;
      gap:5px;
      background:var(--brand-soft);
      border:1px solid #d4e4ff;
      color:#224280;
      padding:4px 9px;
      border-radius:999px;
      font-size:11px;
      font-weight:600;
      line-height:1.2;
    }

    .hint{
      border:1px dashed #cfe0ff;
      background:#f7faff;
      border-radius:12px;
      padding:11px 12px;
      color:#304266;
      font-size:12px;
      margin-top:10px;
    }

    .diag{margin-top:10px;background:#f8faff;border:1px solid var(--line);border-radius:12px;padding:10px}
    .diag pre{margin:0;white-space:pre-wrap;word-break:break-word;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11px;color:#425071}

    .small{font-size:12px;color:var(--ink-soft)}

    .table-wrap{
      margin-top:10px;
      border:1px solid var(--line);
      border-radius:12px;
      overflow:auto;
      background:#fff;
    }

    table{width:100%;border-collapse:collapse;min-width:760px}
    th,td{padding:11px 12px;border-bottom:1px solid var(--line-soft);font-size:13px;vertical-align:top;text-align:left}
    th{color:#425472;background:#f8fbff;font-size:12px;text-transform:uppercase;letter-spacing:.4px;position:sticky;top:0;z-index:1}
    tr:hover td{background:#fbfdff}

    img{
      max-width:220px;
      width:100%;
      border-radius:10px;
      border:1px solid #dbe4f5;
      box-shadow:0 2px 8px rgba(31,42,68,.08);
      background:#f5f8ff;
      object-fit:cover;
    }

    .foot{margin-top:10px}

    @keyframes rot{to{transform:rotate(360deg)}}

    @media (max-width:1100px){
      .g4{grid-template-columns:repeat(2,minmax(0,1fr))}
      .toolbar-actions button{min-width:190px}
    }

    @media (max-width:840px){
      .g3,.g4{grid-template-columns:1fr}
      .wrap{padding:0 14px}
      .top{position:static}
      .toolbar{align-items:stretch}
      .toolbar-actions{min-width:0;width:100%}
      .toolbar-actions button{width:100%}
      .status{width:100%}
      .title{font-size:22px}
      .card{padding:14px}
    }
  </style>
</head>
<body>
  <div class="top">
    <div class="wrap">
      <h1 class="title">UniFi Protect Detection Explorer</h1>
      <div class="subtitle">Filter detections by NVR, camera, event type, and time window — then export images to disk.</div>
    </div>
  </div>

  <div class="wrap layout">
    <div class="card">
      <div class="section-head">
        <div class="section-title">Connection</div>
      </div>
      <div class="grid g4">
        <div class="field"><label>NVR IP / Host</label><input id="host" placeholder="192.168.1.50"/></div>
        <div class="field"><label>Protect Username</label><input id="username"/></div>
        <div class="field"><label>Protect Password</label><input id="password" type="password"/></div>
        <div class="field row"><button id="loadCameras">Connect &amp; Load Cameras</button></div>
      </div>
    </div>

    <div class="card">
      <div class="section-head">
        <div class="section-title">Time &amp; Scope</div>
      </div>
      <div class="grid g4">
        <div class="field"><label>From</label><input id="from" type="datetime-local"/></div>
        <div class="field"><label>To</label><input id="to" type="datetime-local"/></div>
        <div class="field"><label>Timezone</label>
          <select id="timezone"></select>
        </div>
        <div class="field"><label>Max Events</label><input id="limit" type="number" value="100" min="1" max="500"/></div>
      </div>
    </div>

    <div class="card">
      <div class="section-head">
        <div class="section-title">Filters &amp; Export</div>
      </div>
      <div class="grid g3">
        <div class="field">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <label style="margin:0">Cameras (multi-select)</label>
            <span id="camToggle" style="font-size:11px;font-weight:600;color:var(--brand);cursor:pointer;display:none">Select All</span>
          </div>
          <select id="camera" multiple size="5"></select>
        </div>
        <div class="field">
          <label>Event Types</label>
          <div class="grid g3" id="types"></div>
        </div>
        <div class="field">
          <label>Save images to folder</label>
          <input id="outputDir" placeholder="/home/fyder9/detections"/>
          <div style="height:9px"></div>
          <label><input type="checkbox" id="useEventThumbnail" checked/> Prefer event thumbnail (fallback to camera snapshot)</label>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <div class="toolbar-actions">
          <button id="search">Search Detections</button>
          <button id="save" class="btn-muted">Save Selected Images to Disk</button>
        </div>
        <div id="status" class="status">Ready.</div>
      </div>
    </div>

    <div class="card">
      <div class="section-head">
        <div class="section-title">Results</div>
        <div class="small">Applied filters</div>
      </div>

      <div id="filterSummary" class="chips"></div>
      <div id="noResultsHint" class="hint" style="display:none"></div>

      <div id="diagnostics" class="diag" style="display:none">
        <div class="small" style="margin-bottom:6px">Backend diagnostics</div>
        <pre id="diagnosticsText"></pre>
      </div>

      <div class="table-wrap">
        <table>
          <thead><tr><th><input type="checkbox" id="selectAll" title="Select all rows"/></th><th>Time</th><th>Camera</th><th>Type</th><th>Score</th><th>Preview</th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
      <div class="small foot" id="foot"></div>
    </div>
  </div>

<script>
const typeOptions = ['motion','ring','smartDetectZone','person','vehicle','animal','package'];
const typesDiv = document.getElementById('types');
const loadCameras = document.getElementById('loadCameras');
const search = document.getElementById('search');
const save = document.getElementById('save');
const status = document.getElementById('status');
let lastEvents = [];
let lastCameraMap = {};

for(const t of typeOptions){
  const id = 't_'+t;
  const el = document.createElement('div');
  el.innerHTML = `<label><input type="checkbox" id="${id}" value="${t}"/> ${t}</label>`;
  typesDiv.appendChild(el);
}

typeOptions.filter(t=>['person','vehicle','animal','package'].includes(t)).forEach(t=>{
  const e=document.getElementById('t_'+t); if(e) e.checked=true;
});

let camAllSelected = false;
document.getElementById('camToggle').addEventListener('click', () => {
  camAllSelected = !camAllSelected;
  const sel = document.getElementById('camera');
  for (const o of sel.options) o.selected = camAllSelected;
  document.getElementById('camToggle').textContent = camAllSelected ? 'Select None' : 'Select All';
  summarizeFilters();
});

document.getElementById('selectAll').addEventListener('change', function() {
  document.querySelectorAll('.row-check').forEach(cb => cb.checked = this.checked);
});

const buttonDefaults = new Map();
let busyAction = null;

function setStatus(message, tone='normal'){
  status.textContent = message;
  status.classList.remove('busy','error');
  if(tone === 'busy') status.classList.add('busy');
  if(tone === 'error') status.classList.add('error');
}

function setBusy(actionButton, on, text='Working...'){
  if(!buttonDefaults.has(actionButton)) buttonDefaults.set(actionButton, actionButton.textContent);
  if(on){
    busyAction = actionButton;
    actionButton.disabled = true;
    actionButton.innerHTML = `<span class="inline-spin"></span>${text}`;
    setStatus(text, 'busy');
  } else {
    actionButton.disabled = false;
    actionButton.textContent = buttonDefaults.get(actionButton);
    if(busyAction === actionButton) busyAction = null;
  }
}

function toLocalInputValue(date){
  const pad=n=>String(n).padStart(2,'0');
  const y=date.getFullYear();
  const m=pad(date.getMonth()+1);
  const d=pad(date.getDate());
  const h=pad(date.getHours());
  const mi=pad(date.getMinutes());
  return `${y}-${m}-${d}T${h}:${mi}`;
}

function localInputToUtcMs(str, ianaTimezone) {
  if (!str) return null;
  const naive = new Date(str + 'Z');
  const parts = new Intl.DateTimeFormat('en-CA', {
    timeZone: ianaTimezone,
    year:'numeric', month:'2-digit', day:'2-digit',
    hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false
  }).formatToParts(naive);
  const p = Object.fromEntries(parts.filter(x=>x.type!=='literal').map(x=>[x.type,x.value]));
  const tzDate = new Date(`${p.year}-${p.month}-${p.day}T${p.hour}:${p.minute}:${p.second}Z`);
  return naive.getTime() + (naive.getTime() - tzDate.getTime());
}

function initDefaultRange(){
  const now = new Date();
  const oneHourAgo = new Date(now.getTime() - 60*60*1000);
  document.getElementById('to').value = toLocalInputValue(now);
  document.getElementById('from').value = toLocalInputValue(oneHourAgo);
}

function creds(){
  return {
    host: document.getElementById('host').value.trim(),
    username: document.getElementById('username').value.trim(),
    password: document.getElementById('password').value
  }
}

async function post(url, body){
  const r = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
  const j = await r.json();
  if(!r.ok) throw new Error(j.error || 'Request failed');
  return j;
}

function populateTimezones() {
  const preferred = ['Europe/Rome','UTC','Europe/London','America/New_York',
                     'America/Los_Angeles','America/Chicago','Asia/Dubai',
                     'Asia/Tokyo','Asia/Singapore','Australia/Sydney'];
  const sel = document.getElementById('timezone');
  const all = (typeof Intl.supportedValuesOf === 'function')
    ? Intl.supportedValuesOf('timeZone') : preferred;
  const rest = all.filter(tz => !preferred.includes(tz));
  const browserTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  [...preferred, ...rest].forEach(tz => {
    const o = document.createElement('option');
    o.value = tz; o.textContent = tz;
    if (tz === browserTz) o.selected = true;
    sel.appendChild(o);
  });
  if (!sel.value) sel.value = 'Europe/Rome';
}

function fmtTime(v){
  if(!v) return '-';
  const tz = document.getElementById('timezone').value || 'Europe/Rome';
  const d = new Date(v);
  return new Intl.DateTimeFormat('en-GB',{dateStyle:'short',timeStyle:'medium',timeZone:tz}).format(d) + ` (${tz})`;
}

function summarizeFilters(){
  const cameraSel = [...document.getElementById('camera').selectedOptions];
  const eventTypes = typeOptions.filter(t => document.getElementById('t_'+t).checked);
  const chips = [
    `From: ${document.getElementById('from').value || '-'}`,
    `To: ${document.getElementById('to').value || '-'}`,
    `TZ: ${document.getElementById('timezone').value || 'UTC'}`,
    `Limit: ${document.getElementById('limit').value || 100}`,
    `Cameras: ${cameraSel.length ? cameraSel.map(c=>c.textContent).join(', ') : 'All cameras'}`,
    `Types: ${eventTypes.length ? eventTypes.join(', ') : 'Any'}`
  ];
  const filterSummary = document.getElementById('filterSummary');
  filterSummary.innerHTML = chips.map(c=>`<span class="pill">${c}</span>`).join('');
}

function renderNoResultsHint(diag){
  const hint = document.getElementById('noResultsHint');
  const tips = [
    'Try widening the time window (last 24h is a good baseline).',
    'Clear camera selection to search all cameras.',
    'Enable broader event types (motion/ring + smart detect types).',
    'Lower strict filters and search with a higher Max Events value.'
  ];
  const backendHint = diag?.hint || diag?.message || '';
  hint.innerHTML = `<strong>No detections matched current filters.</strong><br>${backendHint ? `${backendHint}<br><br>` : ''}<span class="small">Quick checks:</span><ul style="margin:6px 0 0 16px;padding:0">${tips.map(t=>`<li>${t}</li>`).join('')}</ul>`;
  hint.style.display = 'block';
}

function renderDiagnostics(diag){
  const box = document.getElementById('diagnostics');
  const txt = document.getElementById('diagnosticsText');
  if(!diag || (typeof diag === 'object' && !Object.keys(diag).length)){
    box.style.display = 'none';
    txt.textContent = '';
    return;
  }
  txt.textContent = typeof diag === 'string' ? diag : JSON.stringify(diag, null, 2);
  box.style.display = 'block';
}

loadCameras.onclick = async () => {
  try {
    setBusy(loadCameras, true, 'Connecting...');
    const { cameras, diagnostics } = await post('/api/cameras', creds());
    const sel = document.getElementById('camera');
    sel.innerHTML='';
    cameras.forEach(c=>{
      const o = document.createElement('option');
      o.value=c.id; o.textContent=`${c.name} (${c.model||'camera'})`;
      sel.appendChild(o);
    });
    const toggle = document.getElementById('camToggle');
    toggle.style.display = cameras.length > 1 ? 'inline' : 'none';
    toggle.textContent = 'Select All';
    camAllSelected = false;
    summarizeFilters();
    renderDiagnostics(diagnostics);
    setStatus(`Connected. Loaded ${cameras.length} cameras.`);
  } catch(e){ setStatus(e.message, 'error'); }
  finally { setBusy(loadCameras, false); }
};

search.onclick = async () => {
  try {
    setBusy(search, true, 'Searching...');
    const cameraSel = [...document.getElementById('camera').selectedOptions].map(o=>o.value);
    const eventTypes = typeOptions.filter(t => document.getElementById('t_'+t).checked);

    summarizeFilters();
    document.getElementById('noResultsHint').style.display = 'none';

    const data = await post('/api/detections', {
      ...creds(),
      startTime: localInputToUtcMs(document.getElementById('from').value, document.getElementById('timezone').value),
      endTime: localInputToUtcMs(document.getElementById('to').value, document.getElementById('timezone').value),
      limit: Number(document.getElementById('limit').value || 100),
      cameraIds: cameraSel,
      eventTypes
    });

    lastEvents = data.events || [];
    lastCameraMap = data.cameraMap || {};

    const tbody = document.getElementById('rows');
    tbody.innerHTML='';

    for(let i=0; i<lastEvents.length; i++){
      const ev = lastEvents[i];
      const tr = document.createElement('tr');
      const tags = [ev.type, ...(ev.smartDetectTypes||[])].filter(Boolean)
        .map(t=>`<span class="pill">${t}</span>`).join(' ');

      const eventBody = { ...creds(), eventId: ev.id };
      const eventReq = encodeURIComponent(JSON.stringify(eventBody));
      const snapBody = { ...creds(), cameraId: ev.camera, width: 640 };
      const snapReq = encodeURIComponent(JSON.stringify(snapBody));
      const img = `<img loading="lazy" src="/api/event-thumbnail-proxy?d=${eventReq}" onerror="this.onerror=null;this.src='/api/snapshot-proxy?d=${snapReq}'"/>`;

      const camName = lastCameraMap[ev.camera] || ev.camera || '-';
      tr.innerHTML = `<td><input type="checkbox" class="row-check" data-index="${i}" checked/></td><td>${fmtTime(ev.start)}</td><td>${camName}</td><td>${tags||'-'}</td><td>${ev.score ?? '-'}</td><td>${img}</td>`;
      tbody.appendChild(tr);
    }

    document.getElementById('selectAll').checked = true;

    renderDiagnostics(data.diagnostics);

    if(!lastEvents.length){
      renderNoResultsHint(data.diagnostics);
      setStatus('No detections found for current filters.');
    } else {
      setStatus(`Found ${data.count} events.`);
    }
    document.getElementById('foot').textContent = `Rows: ${data.count || 0}`;
  } catch(e){ setStatus(e.message, 'error'); }
  finally { setBusy(search, false); }
};

save.onclick = async () => {
  try {
    if(!lastEvents.length){ setStatus('No events to save. Run Search first.', 'error'); return; }
    const outputDir = document.getElementById('outputDir').value.trim();
    if(!outputDir){ setStatus('Set output folder first.', 'error'); return; }

    const checked = [...document.querySelectorAll('.row-check:checked')].map(cb => Number(cb.dataset.index));
    const eventsToSave = checked.map(i => lastEvents[i]);
    if (!eventsToSave.length) { setStatus('No rows selected. Check at least one row.', 'error'); return; }

    setBusy(save, true, 'Saving...');
    const data = await post('/api/save-images', {
      ...creds(),
      outputDir,
      events: eventsToSave,
      useEventThumbnail: document.getElementById('useEventThumbnail').checked
    });

    renderDiagnostics(data.diagnostics);
    setStatus(`Saved ${data.savedCount} images (${data.failedCount} failed). Folder: ${outputDir}`);
  } catch(e){ setStatus(e.message, 'error'); }
  finally { setBusy(save, false); }
};

populateTimezones();
initDefaultRange();
summarizeFilters();
['from','to','timezone','limit','camera'].forEach(id=>{
  document.getElementById(id).addEventListener('change', summarizeFilters);
});
typeOptions.forEach(t=>{
  document.getElementById('t_'+t).addEventListener('change', summarizeFilters);
});
</script>
</body>
</html>
